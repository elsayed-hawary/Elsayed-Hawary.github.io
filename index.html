<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Менеджер инвентаря | Inventory Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            overflow-x: hidden;
        }

        /* iOS Style Container with Rounded Corners */
        .app-container {
            max-width: 430px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* Header with Logo - No Status Bar */
        .header {
            background: #ffffff;
            padding: 20px 20px 16px;
            border-bottom: 0.5px solid rgba(60, 60, 67, 0.08);
        }

        .logo-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .app-title {
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, #007aff, #5e5ce0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .by-signature {
            font-size: 12px;
            color: #8e8e93;
            font-weight: 500;
            letter-spacing: 0.5px;
            font-family: monospace;
        }

        /* Main Content */
        .main-content {
            padding: 20px;
            min-height: calc(100vh - 140px);
            padding-bottom: 90px;
        }

        /* iOS Tab Bar - Modern Style with SF Symbols Style */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(60, 60, 67, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 20px 28px;
            max-width: 430px;
            margin: 0 auto;
            right: auto;
            left: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            position: relative;
        }

        /* SVG Icons - iOS Style */
        .tab-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .tab-icon svg {
            width: 22px;
            height: 22px;
            stroke: #8e8e93;
            stroke-width: 1.7;
            fill: none;
            transition: all 0.2s;
        }

        .tab-item.active .tab-icon svg {
            stroke: #007aff;
            fill: #007aff;
            stroke-width: 1.5;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 500;
            color: #8e8e93;
            letter-spacing: -0.2px;
        }

        .tab-item.active .tab-label {
            color: #007aff;
            font-weight: 600;
        }

        .tab-item.active .tab-icon {
            transform: translateY(-2px);
        }

        /* iOS Form Elements - Modern */
        .form-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 4px 0;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            font-size: 15px;
            font-weight: 500;
            color: #1c1c1e;
            margin-bottom: 8px;
            display: block;
            letter-spacing: -0.2px;
        }

        .ios-input, .ios-select {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            background: #f9f9fb;
            font-family: inherit;
            transition: all 0.2s;
            color: #000;
        }

        .ios-input:focus, .ios-select:focus {
            outline: none;
            border-color: #007aff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }

        .ios-button {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,122,255,0.2);
        }

        .ios-button:active {
            transform: scale(0.98);
            background: #0051b3;
        }

        /* Product Cards - iOS Style */
        .products-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 0.5px solid rgba(60, 60, 67, 0.08);
            transition: all 0.2s;
        }

        .product-card:active {
            transform: scale(0.99);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .product-name {
            font-size: 17px;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.2px;
        }

        .product-actions {
            display: flex;
            gap: 16px;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.1s;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn svg, .delete-btn svg {
            width: 18px;
            height: 18px;
        }

        .edit-btn svg {
            stroke: #007aff;
            fill: none;
        }

        .delete-btn svg {
            stroke: #ff3b30;
            fill: none;
        }

        .edit-btn:active, .delete-btn:active {
            transform: scale(0.9);
        }

        .product-details {
            font-size: 15px;
            color: #6c6c70;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .unit-badge {
            background: #f2f2f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Search Bar */
        .search-bar {
            margin-bottom: 20px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .search-icon svg {
            width: 18px;
            height: 18px;
            stroke: #8e8e93;
            stroke-width: 1.7;
            fill: none;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-size: 17px;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            background: #f9f9fb;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: #007aff;
            background: #ffffff;
        }

        /* Autocomplete */
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 0.5px solid #e5e5ea;
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-top: 4px;
        }

        .autocomplete-item {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 0.5px solid #e5e5ea;
            font-size: 15px;
        }

        .autocomplete-item:hover {
            background: #f2f2f6;
        }

        /* Reports Section */
        .report-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .report-btn {
            flex: 1;
            background: #007aff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .report-btn:active {
            transform: scale(0.98);
        }

        /* Stats Card */
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
        }

        .stats-title {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .stats-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e93;
        }

        /* Unit Group */
        .unit-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .unit-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f2f2f6;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .unit-option.selected {
            background: #007aff;
            color: white;
        }

        @media (max-width: 430px) {
            .tab-bar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-section">
            <span class="app-title">ELSAYED DID</span>
            <span class="by-signature">BY ELSAYED</span>
        </div>
    </div>
    
    <div class="main-content" id="mainContent"></div>
</div>

<div class="tab-bar">
    <div class="tab-item active" data-tab="inventory">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 7L12 12L4 7M20 7V17L12 22L4 17V7M12 12L20 7M12 12L4 7M12 12V22"/>
                <path d="M12 12L20 7M12 12L4 7"/>
            </svg>
        </div>
        <div class="tab-label">Инвентарь</div>
    </div>
    <div class="tab-item" data-tab="products">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="16" rx="2" ry="2"/>
                <line x1="8" y1="10" x2="16" y2="10"/>
                <line x1="8" y1="14" x2="12" y2="14"/>
            </svg>
        </div>
        <div class="tab-label">Товары</div>
    </div>
    <div class="tab-item" data-tab="reports">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V20H3V16M21 12L12 3L3 12M9 12H15M12 9V15"/>
                <path d="M12 3L21 12H17L12 7L7 12H3L12 3Z"/>
            </svg>
        </div>
        <div class="tab-label">Отчеты</div>
    </div>
    <div class="tab-item" data-tab="manage">
        <div class="tab-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82L12 22z"/>
                <path d="M4.6 9a1.65 1.65 0 0 0-.33 1.82c.23.57.79.97 1.41.97H18.32c.62 0 1.18-.4 1.41-.97a1.65 1.65 0 0 0-.33-1.82L12 2z"/>
            </svg>
        </div>
        <div class="tab-label">Управление</div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px; font-size: 20px;">✏️ Редактировать товар</h3>
        <input type="text" id="editProductId" style="display: none;">
        <div class="form-group">
            <label class="form-label">Название товара</label>
            <input type="text" id="editName" class="ios-input">
        </div>
        <div class="form-group">
            <label class="form-label">Единица измерения</label>
            <div class="unit-group" id="editUnitGroup">
                <div class="unit-option" data-unit="g">г</div>
                <div class="unit-option" data-unit="kg">кг</div>
                <div class="unit-option" data-unit="шт">шт</div>
                <div class="unit-option" data-unit="П">П</div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" id="editQuantityLabel">Количество</label>
            <input type="number" id="editQuantity" class="ios-input" step="any">
        </div>
        <button class="ios-button" onclick="saveEdit()">Сохранить</button>
        <button class="ios-button" style="background: #8e8e93; margin-top: 10px;" onclick="closeModal()">Отмена</button>
    </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
    let products = [];
    let currentTab = 'inventory';
    let searchQuery = '';
    let selectedUnit = 'kg';

    const unitLabels = {
        'g': 'г',
        'kg': 'кг',
        'шт': 'шт',
        'П': 'П'
    };

    function loadData() {
        const saved = localStorage.getItem('inventory_products_v2');
        if (saved) {
            products = JSON.parse(saved);
        } else {
            products = [
                { id: '1', name: 'Яблоки', unit: 'kg', quantity: 5.5, unitLabel: 'кг' },
                { id: '2', name: 'Апельсины', unit: 'kg', quantity: 3.2, unitLabel: 'кг' },
                { id: '3', name: 'Бананы', unit: 'шт', quantity: 20, unitLabel: 'шт' }
            ];
        }
        renderCurrentTab();
    }

    function saveData() {
        localStorage.setItem('inventory_products_v2', JSON.stringify(products));
    }

    function generateId() {
        return Date.now().toString() + Math.random().toString(36).substr(2, 9);
    }

    function addProduct() {
        const nameInput = document.getElementById('productName');
        const quantityInput = document.getElementById('quantity');
        
        const name = nameInput.value.trim();
        let quantity = parseFloat(quantityInput.value);
        
        if (!name) {
            alert('Пожалуйста, введите название товара');
            return;
        }
        
        if (isNaN(quantity) || quantity <= 0) {
            alert('Пожалуйста, введите корректное количество');
            return;
        }
        
        const newProduct = {
            id: generateId(),
            name: name,
            unit: selectedUnit,
            quantity: quantity,
            unitLabel: unitLabels[selectedUnit]
        };
        
        products.push(newProduct);
        saveData();
        
        nameInput.value = '';
        quantityInput.value = '';
        
        renderCurrentTab();
        
        if (currentTab !== 'products') {
            switchTab('products');
        }
    }
    
    function deleteProduct(id) {
        if (confirm('Вы уверены, что хотите удалить этот товар?')) {
            products = products.filter(p => p.id !== id);
            saveData();
            renderCurrentTab();
        }
    }
    
    function editProduct(id) {
        const product = products.find(p => p.id === id);
        if (product) {
            document.getElementById('editProductId').value = product.id;
            document.getElementById('editName').value = product.name;
            document.getElementById('editQuantity').value = product.quantity;
            
            document.querySelectorAll('#editUnitGroup .unit-option').forEach(opt => {
                if (opt.dataset.unit === product.unit) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
            
            document.getElementById('editModal').style.display = 'flex';
        }
    }
    
    function saveEdit() {
        const id = document.getElementById('editProductId').value;
        const name = document.getElementById('editName').value.trim();
        const selectedUnitElem = document.querySelector('#editUnitGroup .unit-option.selected');
        const unit = selectedUnitElem ? selectedUnitElem.dataset.unit : 'kg';
        const quantity = parseFloat(document.getElementById('editQuantity').value);
        
        if (!name) {
            alert('Пожалуйста, введите название товара');
            return;
        }
        
        if (isNaN(quantity) || quantity <= 0) {
            alert('Пожалуйста, введите корректное количество');
            return;
        }
        
        const index = products.findIndex(p => p.id === id);
        if (index !== -1) {
            products[index] = {
                ...products[index],
                name: name,
                unit: unit,
                quantity: quantity,
                unitLabel: unitLabels[unit]
            };
            saveData();
            closeModal();
            renderCurrentTab();
        }
    }
    
    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }
    
    function exportToExcel() {
        const wsData = [
            ['Название товара', 'Единица измерения', 'Количество', 'Обозначение'],
            ...products.map(p => [p.name, p.unit === 'g' ? 'Грамм' : p.unit === 'kg' ? 'Килограмм' : p.unit === 'шт' ? 'Штук' : 'Пакет', p.quantity, p.unitLabel])
        ];
        
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Inventory Report');
        XLSX.writeFile(wb, `inventory_report_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
    
    function getFilteredProducts() {
        if (!searchQuery) return products;
        return products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
    }
    
    function setupAutocomplete() {
        const nameInput = document.getElementById('productName');
        if (!nameInput) return;
        
        nameInput.addEventListener('input', function(e) {
            const value = e.target.value.toLowerCase();
            const existingNames = products.map(p => p.name).filter(name => name.toLowerCase().includes(value));
            const uniqueNames = [...new Set(existingNames)];
            
            const existingList = document.querySelector('.autocomplete-list');
            if (existingList) existingList.remove();
            
            if (value && uniqueNames.length > 0) {
                const list = document.createElement('div');
                list.className = 'autocomplete-list';
                uniqueNames.forEach(name => {
                    const item = document.createElement('div');
                    item.className = 'autocomplete-item';
                    item.textContent = name;
                    item.onclick = () => {
                        nameInput.value = name;
                        list.remove();
                    };
                    list.appendChild(item);
                });
                nameInput.parentNode.appendChild(list);
            }
        });
        
        document.addEventListener('click', function(e) {
            if (!nameInput.contains(e.target)) {
                const list = document.querySelector('.autocomplete-list');
                if (list) list.remove();
            }
        });
    }
    
    function renderInventoryTab() {
        return `
            <div class="form-card">
                <div class="form-group">
                    <label class="form-label">Название товара</label>
                    <div style="position: relative;">
                        <input type="text" id="productName" class="ios-input" placeholder="Введите название товара" autocomplete="off">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Единица измерения</label>
                    <div class="unit-group" id="unitGroup">
                        <div class="unit-option ${selectedUnit === 'g' ? 'selected' : ''}" data-unit="g">г</div>
                        <div class="unit-option ${selectedUnit === 'kg' ? 'selected' : ''}" data-unit="kg">кг</div>
                        <div class="unit-option ${selectedUnit === 'шт' ? 'selected' : ''}" data-unit="шт">шт</div>
                        <div class="unit-option ${selectedUnit === 'П' ? 'selected' : ''}" data-unit="П">П</div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Количество</label>
                    <input type="number" id="quantity" class="ios-input" placeholder="Введите количество" step="any">
                </div>
                <button class="ios-button" onclick="addProduct()">Добавить товар</button>
            </div>
        `;
    }
    
    function renderProductsTab() {
        const filtered = getFilteredProducts();
        
        let html = `
            <div class="search-bar">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </div>
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск товаров..." oninput="updateSearch(this.value)">
            </div>
            <div class="products-list">
        `;
        
        if (filtered.length === 0) {
            html += `<div class="empty-state">Нет товаров</div>`;
        } else {
            filtered.forEach(product => {
                html += `
                    <div class="product-card">
                        <div class="product-header">
                            <span class="product-name">${escapeHtml(product.name)}</span>
                            <div class="product-actions">
                                <button class="edit-btn" onclick="editProduct('${product.id}')">
                                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17 3L21 7L7 21H3V17L17 3Z"/>
                                        <path d="M15 5L19 9"/>
                                    </svg>
                                </button>
                                <button class="delete-btn" onclick="deleteProduct('${product.id}')">
                                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6L18 19C17.9 20.3 16.8 21.3 15.5 21.3H8.5C7.2 21.3 6.1 20.3 6 19L5 6"/>
                                        <line x1="10" y1="11" x2="10" y2="17"/>
                                        <line x1="14" y1="11" x2="14" y2="17"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="product-details">
                            <span class="unit-badge">${product.quantity} ${product.unitLabel}</span>
                        </div>
                    </div>
                `;
            });
        }
        
        html += `</div>`;
        return html;
    }
    
    function renderReportsTab() {
        const totalWeight = products.reduce((sum, p) => sum + p.quantity, 0);
        
        return `
            <div class="stats-card">
                <div class="stats-title">Общая статистика</div>
                <div class="stats-value">${products.length} товаров</div>
                <div class="stats-value" style="font-size: 20px;">${totalWeight.toFixed(2)} ед.</div>
            </div>
            <div class="report-buttons">
                <button class="report-btn" onclick="exportToExcel()">Экспорт Excel</button>
            </div>
            <div class="products-list">
                <div style="background: #f9f9fb; padding: 16px; border-radius: 16px;">
                    <h3 style="margin-bottom: 12px; font-size: 16px;">Последние добавленные</h3>
                    ${products.slice(-3).map(p => `
                        <div style="padding: 8px 0; border-bottom: 0.5px solid #e5e5ea;">
                            ${p.name} - ${p.quantity} ${p.unitLabel}
                        </div>
                    `).join('') || '<div>Нет товаров</div>'}
                </div>
            </div>
        `;
    }
    
    function renderManagementTab() {
        const filtered = getFilteredProducts();
        
        let html = `
            <div class="search-bar">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </div>
                <input type="text" id="manageSearchInput" class="search-input" placeholder="Поиск товаров..." oninput="updateSearch(this.value)">
            </div>
            <div class="products-list">
        `;
        
        if (filtered.length === 0) {
            html += `<div class="empty-state">Нет товаров</div>`;
        } else {
            filtered.forEach(product => {
                html += `
                    <div class="product-card">
                        <div class="product-header">
                            <span class="product-name">${escapeHtml(product.name)}</span>
                            <div class="product-actions">
                                <button class="edit-btn" onclick="editProduct('${product.id}')">
                                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M17 3L21 7L7 21H3V17L17 3Z"/>
                                        <path d="M15 5L19 9"/>
                                    </svg>
                                </button>
                                <button class="delete-btn" onclick="deleteProduct('${product.id}')">
                                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6L18 19C17.9 20.3 16.8 21.3 15.5 21.3H8.5C7.2 21.3 6.1 20.3 6 19L5 6"/>
                                        <line x1="10" y1="11" x2="10" y2="17"/>
                                        <line x1="14" y1="11" x2="14" y2="17"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="product-details">
                            <span class="unit-badge">${product.quantity} ${product.unitLabel}</span>
                        </div>
                    </div>
                `;
            });
        }
        
        html += `</div>`;
        return html;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function updateSearch(query) {
        searchQuery = query;
        renderCurrentTab();
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-item').forEach(item => {
            if (item.dataset.tab === tab) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        renderCurrentTab();
    }
    
    function renderCurrentTab() {
        const mainContent = document.getElementById('mainContent');
        let html = '';
        
        switch(currentTab) {
            case 'inventory':
                html = renderInventoryTab();
                break;
            case 'products':
                html = renderProductsTab();
                break;
            case 'reports':
                html = renderReportsTab();
                break;
            case 'manage':
                html = renderManagementTab();
                break;
        }
        
        mainContent.innerHTML = html;
        
        if (currentTab === 'inventory') {
            setupAutocomplete();
            document.querySelectorAll('#unitGroup .unit-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('#unitGroup .unit-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedUnit = opt.dataset.unit;
                });
            });
        }
        
        document.querySelectorAll('#editUnitGroup .unit-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('#editUnitGroup .unit-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });
        
        if ((currentTab === 'products' || currentTab === 'manage') && searchQuery) {
            const searchInput = document.getElementById('searchInput') || document.getElementById('manageSearchInput');
            if (searchInput) searchInput.value = searchQuery;
        }
    }
    
    document.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => {
            switchTab(tab.dataset.tab);
        });
    });
    
    loadData();
    
    window.onclick = function(event) {
        const modal = document.getElementById('editModal');
        if (event.target === modal) {
            closeModal();
        }
    };
</script>
</body>
</html>
