<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>منشئ الأبحاث العلمية المتقدم - Gemini AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        /* iOS Style Panels */
        .panel {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .panel-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 2px solid #667eea;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f7fafc;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .checkbox-item:hover {
            background: #edf2f7;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .export-bar {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .export-btn {
            flex: 1;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 13px;
            color: #4a5568;
        }

        .export-btn:hover {
            background: #edf2f7;
            border-color: #667eea;
            transform: translateY(-1px);
        }

        .output-panel {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .output-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 16px 24px;
            font-weight: 600;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .research-content {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.8;
            background: #fefefe;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .style-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 2px solid #e2e8f0;
        }

        .api-status {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border: 1px solid #667eea30;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            font-size: 12px;
            text-align: center;
        }

        .range-value {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Academic styling for generated content */
        .academic-content h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 30px 0 20px;
            color: #2d3748;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        .academic-content h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 25px 0 15px;
            color: #4a5568;
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }
        
        .academic-content h3 {
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0 12px;
            color: #718096;
        }
        
        .academic-content p {
            margin: 12px 0;
            line-height: 1.8;
            text-align: justify;
        }
        
        .academic-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .academic-content th, .academic-content td {
            border: 1px solid #cbd5e0;
            padding: 10px;
            text-align: right;
        }
        
        .academic-content th {
            background: #f7fafc;
            font-weight: 600;
        }
        
        .academic-content ul, .academic-content ol {
            margin: 12px 0 12px 30px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Left Panel: Controls -->
    <div class="panel">
        <div class="panel-header">
            <i class="fas fa-graduation-cap"></i>
            منشئ الأبحاث Pro
        </div>

        <div class="api-status" id="apiStatus">
            <i class="fas fa-check-circle" style="color: #48bb78;"></i> 
            <strong>مفتاح Gemini مفعل</strong><br>
            <small style="color: #718096;">AIzaSyCQ8j-8x6khhs-qBMH4Sh4JZ2ObvJAWX3U</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-heading"></i> عنوان البحث</label>
            <input type="text" id="title" placeholder="أدخل عنوان البحث العلمي" value="دور الذكاء الاصطناعي في تطوير المناهج التعليمية">
        </div>

        <div class="form-group">
            <label><i class="fas fa-file-alt"></i> عدد الصفحات</label>
            <input type="range" id="pagesSlider" min="1" max="50" value="16" step="1">
            <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                <span style="font-size: 12px;">1</span>
                <span id="pagesValue" style="background: #667eea; color: white; padding: 2px 12px; border-radius: 20px; font-size: 14px; font-weight: bold;">16 صفحة</span>
                <span style="font-size: 12px;">50</span>
            </div>
            <input type="number" id="pagesInput" min="1" max="50" value="16" style="margin-top: 8px; text-align: center;">
        </div>

        <div class="form-group">
            <label><i class="fas fa-language"></i> لغة البحث</label>
            <select id="language">
                <option value="arabic">العربية (فصحى)</option>
                <option value="english">English</option>
                <option value="russian">Русский</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fas fa-layer-group"></i> مكونات البحث</label>
            <div class="checkbox-grid">
                <div class="checkbox-item"><input type="checkbox" id="abstract" checked> <label>الملخص</label></div>
                <div class="checkbox-item"><input type="checkbox" id="toc" checked> <label>الفهرس</label></div>
                <div class="checkbox-item"><input type="checkbox" id="intro" checked> <label>المقدمة</label></div>
                <div class="checkbox-item"><input type="checkbox" id="conclusion" checked> <label>الخاتمة</label></div>
                <div class="checkbox-item"><input type="checkbox" id="references" checked> <label>المصادر</label></div>
                <div class="checkbox-item"><input type="checkbox" id="methodology" checked> <label>المنهجية</label></div>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label><i class="fas fa-palette"></i> تنسيق متقدم</label>
            <div class="style-row">
                <select id="fontFamily">
                    <option value="'Times New Roman', 'Traditional Arabic', serif">Times New Roman</option>
                    <option value="'Georgia', 'Amiri', serif" selected>Georgia (أمثل للعربية)</option>
                    <option value="'Arial', 'Tahoma', sans-serif">Arial</option>
                    <option value="'Calibri', sans-serif">Calibri</option>
                </select>
                <select id="fontSize">
                    <option value="12px">12px</option>
                    <option value="14px" selected>14px</option>
                    <option value="16px">16px</option>
                    <option value="18px">18px</option>
                </select>
                <select id="lineHeight">
                    <option value="1.6">1.6 (عادي)</option>
                    <option value="1.8" selected>1.8 (واسع)</option>
                    <option value="2">2 (مزدوج)</option>
                </select>
            </div>
            <div class="style-row">
                <select id="marginSize">
                    <option value="2cm">هوامش 2 سم</option>
                    <option value="2.5cm" selected>هوامش 2.5 سم</option>
                    <option value="3cm">هوامش 3 سم</option>
                </select>
                <select id="headingStyle">
                    <option value="modern">عناوين عصرية</option>
                    <option value="classic" selected>عناوين كلاسيكية</option>
                    <option value="bold">عناوين بارزة</option>
                </select>
                <select id="paragraphAlign">
                    <option value="right">محاذاة يمين</option>
                    <option value="justify" selected>ضبط (Justify)</option>
                </select>
            </div>
        </div>

        <button class="btn-primary" id="generateBtn">
            <i class="fas fa-magic"></i> توليد البحث
        </button>

        <div class="export-bar" id="exportBar" style="display: none;">
            <div class="export-btn" id="wordBtn"><i class="fas fa-file-word"></i> Word</div>
            <div class="export-btn" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</div>
            <div class="export-btn" id="copyBtn"><i class="fas fa-copy"></i> نسخ</div>
        </div>
    </div>

    <!-- Right Panel: Output -->
    <div class="output-panel">
        <div class="output-header">
            <span><i class="fas fa-book-open"></i> البحث العلمي</span>
            <span id="langBadge" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px;">العربية</span>
        </div>
        <div id="researchResult" class="research-content">
            <div style="text-align: center; color: #a0aec0; padding: 60px 20px;">
                <i class="fas fa-robot" style="font-size: 60px; margin-bottom: 20px; display: block; color: #667eea;"></i>
                <h3 style="color: #4a5568;">جاهز لتوليد بحثك</h3>
                <p style="margin-top: 10px;">أدخل عنوان البحث واضغط "توليد البحث"</p>
            </div>
        </div>
        <div id="progressContainer" style="display: none; padding: 16px; background: white;">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="progressText" style="font-size: 12px; margin-top: 8px; text-align: center; color: #667eea;">جاري توليد البحث...</p>
        </div>
    </div>
</div>

<script>
    // Gemini API Key (provided by user)
    const GEMINI_API_KEY = "AIzaSyCQ8j-8x6khhs-qBMH4Sh4JZ2ObvJAWX3U";
    let currentGeneratedHTML = "";
    
    // Sync pages slider and input
    const pagesSlider = document.getElementById('pagesSlider');
    const pagesInput = document.getElementById('pagesInput');
    const pagesValue = document.getElementById('pagesValue');
    
    pagesSlider.addEventListener('input', () => {
        pagesInput.value = pagesSlider.value;
        pagesValue.innerText = pagesSlider.value + " صفحة";
    });
    pagesInput.addEventListener('input', () => {
        let val = Math.min(50, Math.max(1, parseInt(pagesInput.value) || 1));
        pagesSlider.value = val;
        pagesValue.innerText = val + " صفحة";
    });
    
    async function generateResearch() {
        const title = document.getElementById('title').value.trim();
        if (!title) {
            alert('الرجاء إدخال عنوان البحث');
            return;
        }
        
        const pages = parseInt(pagesInput.value);
        const language = document.getElementById('language').value;
        const includeAbstract = document.getElementById('abstract').checked;
        const includeToc = document.getElementById('toc').checked;
        const includeIntro = document.getElementById('intro').checked;
        const includeConclusion = document.getElementById('conclusion').checked;
        const includeReferences = document.getElementById('references').checked;
        const includeMethodology = document.getElementById('methodology').checked;
        
        // Language mapping
        let langText = "";
        let systemLang = "";
        if (language === 'arabic') {
            langText = "اللغة: العربية الفصحى الأكاديمية";
            systemLang = "اكتب البحث باللغة العربية الفصحى";
        } else if (language === 'english') {
            langText = "Language: English";
            systemLang = "Write the research in English";
        } else {
            langText = "Язык: Русский";
            systemLang = "Напишите исследование на русском языке";
        }
        
        let components = [];
        if (includeAbstract) components.push("الملخص (Abstract)");
        if (includeToc) components.push("فهرس المحتويات (Table of Contents)");
        if (includeIntro) components.push("المقدمة (Introduction)");
        components.push("المحتوى الرئيسي (Main Body) - فصول متعددة");
        if (includeMethodology) components.push("منهجية البحث (Methodology)");
        if (includeConclusion) components.push("الخاتمة والتوصيات (Conclusion)");
        if (includeReferences) components.push("قائمة المراجع (References - 20 مرجع على الأقل)");
        
        const chaptersCount = Math.min(8, Math.max(3, Math.floor(pages / 3) + 2));
        
        const prompt = `أنت أستاذ جامعي متخصص في البحث العلمي. قم بكتابة بحث علمي كامل ومتكامل حول العنوان التالي:

"${title}"

${langText}
${systemLang}

مواصفات البحث:
- عدد الصفحات: ${pages} صفحة (محتوى مفصل وعميق)
- عدد الفصول الرئيسية: ${chaptersCount} فصول على الأقل
- المكونات المطلوبة: ${components.join('، ')}

الهيكل المطلوب:
1. الملخص (200-300 كلمة)
2. فهرس المحتويات (مع أرقام صفحات تقديرية)
3. المقدمة (تشمل: الخلفية، مشكلة البحث، الأسئلة، الأهداف، الأهمية)
4. الفصل الأول: الإطار النظري والدراسات السابقة
5. الفصل الثاني: منهجية البحث (إذا تم اختيارها)
6. الفصل الثالث: النتائج والمناقشة
7. الفصل الرابع: الخاتمة والتوصيات
8. قائمة المراجع (20 مرجعًا أكاديميًا حقيقيًا)

متطلبات التنسيق (HTML):
- استخدم <h1> للعنوان الرئيسي
- استخدم <h2> للفصول
- استخدم <h3> للأقسام الفرعية
- استخدم <p> للفقرات مع محاذاة مناسبة
- استخدم <ul> أو <ol> للقوائم
- أضف استشهادات داخل النص مثل (الكاتب، السنة) أو (Author, Year)
- أضف جداول أو إحصائيات افتراضية واقعية عند الحاجة

تأكد من:
- المحتوى أصلي وغير مكرر
- الطول مناسب لعدد ${pages} صفحات
- جودة أكاديمية عالية
- استخدام لغة علمية دقيقة

اكتب البحث كاملاً بتنسيق HTML مع تطبيق class="academic-content" على الحاوية الرئيسية.`;
        
        const generateBtn = document.getElementById('generateBtn');
        const originalText = generateBtn.innerHTML;
        generateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التوليد...';
        generateBtn.disabled = true;
        
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';
        
        try {
            let progress = 0;
            const interval = setInterval(() => {
                progress = Math.min(90, progress + 4);
                progressFill.style.width = progress + '%';
                if (progress < 20) progressText.innerText = 'جاري الاتصال بـ Gemini AI...';
                else if (progress < 50) progressText.innerText = 'AI يكتب البحث العلمي...';
                else if (progress < 80) progressText.innerText = 'تنسيق المحتوى وإضافة المراجع...';
                else progressText.innerText = 'اكتمال التوليد...';
            }, 1500);
            
            // Using correct model: gemini-pro
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }],
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 8192,
                        topP: 0.95,
                        topK: 40
                    }
                })
            });
            
            clearInterval(interval);
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'فشل الاتصال');
            }
            
            const data = await response.json();
            let generatedHtml = data.candidates[0].content.parts[0].text;
            
            // Clean up markdown
            generatedHtml = generatedHtml.replace(/```html/gi, '').replace(/```/g, '');
            
            // Add academic class wrapper
            if (!generatedHtml.includes('academic-content')) {
                generatedHtml = `<div class="academic-content">${generatedHtml}</div>`;
            }
            
            // Ensure h1 exists
            if (!generatedHtml.includes('<h1>')) {
                generatedHtml = `<h1>${title}</h1>\n${generatedHtml}`;
            }
            
            currentGeneratedHTML = generatedHtml;
            
            // Display
            const researchDiv = document.getElementById('researchResult');
            researchDiv.innerHTML = generatedHtml;
            researchDiv.classList.add('academic-content');
            
            // Apply styling
            applyAdvancedStyling();
            
            // Show export bar
            document.getElementById('exportBar').style.display = 'flex';
            
            // Update language badge
            const langMap = { arabic: 'العربية', english: 'English', russian: 'Русский' };
            document.getElementById('langBadge').innerText = langMap[language];
            
            progressFill.style.width = '100%';
            progressText.innerText = '✅ تم التوليد بنجاح!';
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 2000);
            
        } catch (error) {
            console.error('Error:', error);
            let errorMsg = error.message;
            if (errorMsg.includes('model') || errorMsg.includes('not found')) {
                errorMsg = 'خطأ في النموذج. تأكد من اتصال الإنترنت والمفتاح الصحيح.';
            }
            alert('❌ فشل توليد البحث:\n' + errorMsg);
            progressContainer.style.display = 'none';
        } finally {
            generateBtn.innerHTML = originalText;
            generateBtn.disabled = false;
        }
    }
    
    function applyAdvancedStyling() {
        const researchDiv = document.getElementById('researchResult');
        if (!researchDiv) return;
        
        const fontFamily = document.getElementById('fontFamily').value;
        const fontSize = document.getElementById('fontSize').value;
        const lineHeight = document.getElementById('lineHeight').value;
        const marginSize = document.getElementById('marginSize').value;
        const headingStyle = document.getElementById('headingStyle').value;
        const paragraphAlign = document.getElementById('paragraphAlign').value;
        const language = document.getElementById('language').value;
        
        researchDiv.style.fontFamily = fontFamily;
        researchDiv.style.fontSize = fontSize;
        researchDiv.style.lineHeight = lineHeight;
        researchDiv.style.padding = marginSize;
        researchDiv.style.textAlign = paragraphAlign;
        
        // Direction
        researchDiv.style.direction = language === 'arabic' ? 'rtl' : 'ltr';
        
        // Heading styles
        let styleTag = document.getElementById('dynamicHeadingStyle');
        if (!styleTag) {
            styleTag = document.createElement('style');
            styleTag.id = 'dynamicHeadingStyle';
            document.head.appendChild(styleTag);
        }
        
        let headingCSS = '';
        if (headingStyle === 'classic') {
            headingCSS = `
                .academic-content h1 { font-size: 26px; font-weight: 700; margin: 30px 0 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
                .academic-content h2 { font-size: 22px; font-weight: 600; margin: 25px 0 15px; color: #4a5568; border-right: 4px solid #667eea; padding-right: 15px; }
                .academic-content h3 { font-size: 18px; font-weight: 600; margin: 20px 0 12px; color: #718096; }
            `;
        } else if (headingStyle === 'modern') {
            headingCSS = `
                .academic-content h1 { font-size: 28px; font-weight: 700; margin: 30px 0 20px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
                .academic-content h2 { font-size: 22px; font-weight: 600; margin: 25px 0 15px; background: #f7fafc; padding: 10px 15px; border-radius: 12px; border-right: 4px solid #667eea; }
                .academic-content h3 { font-size: 18px; font-weight: 600; margin: 20px 0 12px; color: #667eea; }
            `;
        } else {
            headingCSS = `
                .academic-content h1 { font-size: 28px; font-weight: 800; margin: 30px 0 20px; text-transform: uppercase; letter-spacing: 1px; }
                .academic-content h2 { font-size: 22px; font-weight: 700; margin: 25px 0 15px; background: #2d3748; color: white; padding: 8px 15px; border-radius: 8px; }
                .academic-content h3 { font-size: 18px; font-weight: 700; margin: 20px 0 12px; color: #2d3748; }
            `;
        }
        
        styleTag.textContent = headingCSS;
    }
    
    // Export functions
    function exportToWord() {
        if (!currentGeneratedHTML) {
            alert('الرجاء توليد البحث أولاً');
            return;
        }
        const title = document.getElementById('title').value.trim() || 'research';
        const fullHtml = `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>${title}</title>
        <style>
            body { 
                font-family: 'Times New Roman', 'Traditional Arabic', serif; 
                font-size: 14px; 
                line-height: 1.8;
                margin: 2.5cm;
                direction: rtl;
            }
            h1 { font-size: 24px; font-weight: bold; margin: 30px 0 20px; border-bottom: 2px solid #000; }
            h2 { font-size: 20px; font-weight: 600; margin: 25px 0 15px; }
            p { text-align: justify; margin: 12px 0; }
            table { border-collapse: collapse; width: 100%; margin: 20px 0; }
            th, td { border: 1px solid #000; padding: 8px; }
        </style>
        </head>
        <body>${currentGeneratedHTML}</body>
        </html>`;
        const blob = new Blob([fullHtml], { type: 'application/msword' });
        saveAs(blob, `${title.replace(/[\\/:*?"<>|]/g, '_')}.doc`);
    }
    
    function exportToPDF() {
        if (!currentGeneratedHTML) {
            alert('الرجاء توليد البحث أولاً');
            return;
        }
        const element = document.getElementById('researchResult');
        const opt = {
            margin: [0.75, 0.75, 0.75, 0.75],
            filename: `${document.getElementById('title').value.trim() || 'research'}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
    
    function copyToClipboard() {
        const text = document.getElementById('researchResult').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('✅ تم نسخ النص إلى الحافظة');
        });
    }
    
    // Event listeners
    document.getElementById('generateBtn').addEventListener('click', generateResearch);
    document.getElementById('wordBtn').addEventListener('click', exportToWord);
    document.getElementById('pdfBtn').addEventListener('click', exportToPDF);
    document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
    
    const styleControls = ['fontFamily', 'fontSize', 'lineHeight', 'marginSize', 'headingStyle', 'paragraphAlign', 'language'];
    styleControls.forEach(id => {
        document.getElementById(id).addEventListener('change', applyAdvancedStyling);
    });
</script>
</body>
</html>
