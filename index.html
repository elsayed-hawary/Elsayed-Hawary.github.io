<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>منشئ الأبحاث العلمية المتقدم - AI Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 24px;
        }

        .panel-header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 2px solid #1e3c72;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #2d3748;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f7fafc;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .checkbox-item:hover {
            background: #edf2f7;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border: none;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(30,60,114,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30,60,114,0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .export-bar {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .export-btn {
            flex: 1;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 13px;
            color: #2d3748;
        }

        .export-btn:hover {
            background: #edf2f7;
            border-color: #1e3c72;
            transform: translateY(-1px);
        }

        .output-panel {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .output-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 16px 24px;
            font-weight: 600;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .research-content {
            padding: 40px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.8;
            background: #fefefe;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            width: 0%;
            transition: width 0.3s;
        }

        .style-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }

        hr {
            margin: 16px 0;
            border: none;
            border-top: 2px solid #e2e8f0;
        }

        .api-status {
            background: linear-gradient(135deg, #1e3c7215, #2a529815);
            border: 1px solid #1e3c7230;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            font-size: 12px;
            text-align: center;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border-color: #1e3c72;
        }

        .academic-content {
            direction: rtl;
        }
        
        .academic-content h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 30px 0 20px;
            color: #1e3c72;
            text-align: center;
            border-bottom: 3px solid #1e3c72;
            padding-bottom: 15px;
        }
        
        .academic-content h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 25px 0 15px;
            color: #2d3748;
            border-right: 4px solid #1e3c72;
            padding-right: 15px;
        }
        
        .academic-content p {
            margin: 12px 0;
            line-height: 1.8;
            text-align: justify;
        }
        
        .academic-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .academic-content th, .academic-content td {
            border: 1px solid #cbd5e0;
            padding: 10px;
            text-align: right;
        }
        
        .academic-content th {
            background: #f7fafc;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="panel">
        <div class="panel-header">
            <i class="fas fa-graduation-cap"></i>
            منشئ الأبحاث المتقدم
        </div>

        <div class="mode-selector">
            <div class="mode-btn active" data-mode="ai" id="modeAiBtn">
                <i class="fas fa-robot"></i> AI (Gemini)
            </div>
            <div class="mode-btn" data-mode="local" id="modeLocalBtn">
                <i class="fas fa-microchip"></i> محلي (بدون إنترنت)
            </div>
        </div>

        <div class="api-status" id="apiStatus">
            <i class="fas fa-info-circle"></i> 
            <strong>وضع AI</strong> - يستخدم Gemini API (جودة عالية)
            <br><small>إذا واجهت مشكلة، استخدم الوضع المحلي</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-heading"></i> عنوان البحث</label>
            <input type="text" id="title" placeholder="أدخل عنوان البحث العلمي" value="دور الذكاء الاصطناعي في تطوير المناهج التعليمية">
        </div>

        <div class="form-group">
            <label><i class="fas fa-file-alt"></i> عدد الصفحات</label>
            <input type="range" id="pagesSlider" min="1" max="50" value="16" step="1">
            <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                <span style="font-size: 12px;">1</span>
                <span id="pagesValue" style="background: #1e3c72; color: white; padding: 2px 12px; border-radius: 20px; font-size: 14px; font-weight: bold;">16 صفحة</span>
                <span style="font-size: 12px;">50</span>
            </div>
            <input type="number" id="pagesInput" min="1" max="50" value="16" style="margin-top: 8px; text-align: center;">
        </div>

        <div class="form-group">
            <label><i class="fas fa-language"></i> لغة البحث</label>
            <select id="language">
                <option value="arabic">العربية (فصحى)</option>
                <option value="english">English</option>
                <option value="russian">Русский</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fas fa-layer-group"></i> مكونات البحث</label>
            <div class="checkbox-grid">
                <div class="checkbox-item"><input type="checkbox" id="abstract" checked> <label>الملخص</label></div>
                <div class="checkbox-item"><input type="checkbox" id="toc" checked> <label>الفهرس</label></div>
                <div class="checkbox-item"><input type="checkbox" id="intro" checked> <label>المقدمة</label></div>
                <div class="checkbox-item"><input type="checkbox" id="conclusion" checked> <label>الخاتمة</label></div>
                <div class="checkbox-item"><input type="checkbox" id="references" checked> <label>المصادر</label></div>
                <div class="checkbox-item"><input type="checkbox" id="methodology" checked> <label>المنهجية</label></div>
            </div>
        </div>

        <hr>

        <div class="form-group">
            <label><i class="fas fa-palette"></i> تنسيق متقدم</label>
            <div class="style-row">
                <select id="fontFamily">
                    <option value="'Times New Roman', 'Traditional Arabic', serif">Times New Roman</option>
                    <option value="'Georgia', 'Amiri', serif" selected>Georgia (أمثل للعربية)</option>
                    <option value="'Arial', 'Tahoma', sans-serif">Arial</option>
                </select>
                <select id="fontSize">
                    <option value="12px">12px</option>
                    <option value="14px" selected>14px</option>
                    <option value="16px">16px</option>
                </select>
                <select id="lineHeight">
                    <option value="1.6">1.6</option>
                    <option value="1.8" selected>1.8</option>
                    <option value="2">2</option>
                </select>
            </div>
            <div class="style-row">
                <select id="marginSize">
                    <option value="2cm">2 سم</option>
                    <option value="2.5cm" selected>2.5 سم</option>
                    <option value="3cm">3 سم</option>
                </select>
                <select id="headingStyle">
                    <option value="modern">عناوين عصرية</option>
                    <option value="classic" selected>عناوين كلاسيكية</option>
                </select>
                <select id="paragraphAlign">
                    <option value="right">يمين</option>
                    <option value="justify" selected>ضبط</option>
                </select>
            </div>
        </div>

        <button class="btn-primary" id="generateBtn">
            <i class="fas fa-magic"></i> توليد البحث
        </button>

        <div class="export-bar" id="exportBar" style="display: none;">
            <div class="export-btn" id="wordBtn"><i class="fas fa-file-word"></i> Word</div>
            <div class="export-btn" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</div>
            <div class="export-btn" id="copyBtn"><i class="fas fa-copy"></i> نسخ</div>
        </div>
    </div>

    <div class="output-panel">
        <div class="output-header">
            <span><i class="fas fa-book-open"></i> البحث العلمي</span>
            <span id="langBadge" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px;">العربية</span>
        </div>
        <div id="researchResult" class="research-content">
            <div style="text-align: center; color: #a0aec0; padding: 60px 20px;">
                <i class="fas fa-robot" style="font-size: 60px; margin-bottom: 20px; display: block; color: #1e3c72;"></i>
                <h3 style="color: #2d3748;">جاهز لتوليد بحثك</h3>
                <p style="margin-top: 10px;">اختر الوضع (AI أو محلي) وأدخل عنوان البحث</p>
            </div>
        </div>
        <div id="progressContainer" style="display: none; padding: 16px;">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="progressText" style="font-size: 12px; margin-top: 8px; text-align: center;">جاري التوليد...</p>
        </div>
    </div>
</div>

<script>
    let currentGeneratedHTML = "";
    let currentMode = "ai"; // ai or local
    
    // Mode switching
    const modeAiBtn = document.getElementById('modeAiBtn');
    const modeLocalBtn = document.getElementById('modeLocalBtn');
    const apiStatus = document.getElementById('apiStatus');
    
    modeAiBtn.addEventListener('click', () => {
        currentMode = "ai";
        modeAiBtn.classList.add('active');
        modeLocalBtn.classList.remove('active');
        apiStatus.innerHTML = '<i class="fas fa-robot"></i> <strong>وضع AI (Gemini)</strong> - جودة عالية، يحتاج إنترنت<br><small>إذا واجهت مشكلة، استخدم الوضع المحلي</small>';
    });
    
    modeLocalBtn.addEventListener('click', () => {
        currentMode = "local";
        modeLocalBtn.classList.add('active');
        modeAiBtn.classList.remove('active');
        apiStatus.innerHTML = '<i class="fas fa-microchip"></i> <strong>وضع التوليد المحلي</strong> - يعمل بدون إنترنت، جودة جيدة';
    });
    
    // Pages sync
    const pagesSlider = document.getElementById('pagesSlider');
    const pagesInput = document.getElementById('pagesInput');
    const pagesValue = document.getElementById('pagesValue');
    
    pagesSlider.addEventListener('input', () => {
        pagesInput.value = pagesSlider.value;
        pagesValue.innerText = pagesSlider.value + " صفحة";
    });
    pagesInput.addEventListener('input', () => {
        let val = Math.min(50, Math.max(1, parseInt(pagesInput.value) || 1));
        pagesSlider.value = val;
        pagesValue.innerText = val + " صفحة";
    });
    
    // Local research generator (works without API)
    function generateLocalResearch() {
        const title = document.getElementById('title').value.trim();
        if (!title) {
            alert('الرجاء إدخال عنوان البحث');
            return false;
        }
        
        const pages = parseInt(pagesInput.value);
        const language = document.getElementById('language').value;
        const includeAbstract = document.getElementById('abstract').checked;
        const includeToc = document.getElementById('toc').checked;
        const includeIntro = document.getElementById('intro').checked;
        const includeConclusion = document.getElementById('conclusion').checked;
        const includeReferences = document.getElementById('references').checked;
        const includeMethodology = document.getElementById('methodology').checked;
        
        let html = `<div class="academic-content" style="direction: rtl;">`;
        
        // Title
        html += `<h1>${title}</h1>`;
        
        // Abstract
        if (includeAbstract) {
            html += `<h2>الملخص</h2>`;
            html += `<p>يهدف هذا البحث إلى دراسة "${title}" بشكل معمق، حيث تم استخدام المنهج الوصفي التحليلي لتحقيق أهداف الدراسة. توصل البحث إلى مجموعة من النتائج المهمة التي تسهم في تطوير المعرفة العلمية في هذا المجال. من أبرز النتائج أن هناك علاقة إيجابية قوية بين المتغيرات المدروسة، مما يستدعي الاهتمام المتزايد بهذا الموضوع. أوصى البحث بضرورة إجراء المزيد من الدراسات المستقبلية وتطبيق التوصيات في المؤسسات المعنية.</p>`;
        }
        
        // Table of Contents
        if (includeToc) {
            html += `<h2>فهرس المحتويات</h2>`;
            html += `<ul>`;
            if (includeAbstract) html += `<li>الملخص ................................ 2</li>`;
            if (includeIntro) html += `<li>المقدمة ................................ 3</li>`;
            html += `<li>الفصل الأول: الإطار النظري ............ 5</li>`;
            if (includeMethodology) html += `<li>الفصل الثاني: منهجية البحث ............ 8</li>`;
            html += `<li>الفصل الثالث: النتائج والمناقشة ....... 11</li>`;
            if (includeConclusion) html += `<li>الخاتمة والتوصيات .................... 14</li>`;
            if (includeReferences) html += `<li>المصادر والمراجع .................... 16</li>`;
            html += `</ul>`;
        }
        
        // Introduction
        if (includeIntro) {
            html += `<h2>المقدمة</h2>`;
            html += `<p>تعد "${title}" من الموضوعات الحيوية التي تحظى باهتمام كبير في الأوساط الأكاديمية والبحثية. حيث يشهد العصر الحالي تطورات متسارعة في هذا المجال، مما يستدعي دراسة معمقة لتحديد أهم العوامل المؤثرة والنتائج المترتبة عليها. تهدف هذه الدراسة إلى تقديم إطار نظري وتحليلي شامل يسهم في فهم أفضل لهذه الظاهرة.</p>`;
            html += `<h3>مشكلة البحث</h3>`;
            html += `<p>تتمثل مشكلة البحث في التساؤل الرئيسي: ما هي طبيعة العلاقة بين المتغيرات المرتبطة بـ "${title}"؟ وما هي السبل المثلى للاستفادة من النتائج في تطوير الممارسات الحالية؟</p>`;
            html += `<h3>أهداف البحث</h3>`;
            html += `<ul><li>تحليل الإطار النظري المتعلق بالموضوع</li><li>دراسة التطبيقات العملية في السياق المحلي والدولي</li><li>تقديم توصيات عملية للمؤسسات المعنية</li></ul>`;
        }
        
        // Methodology
        if (includeMethodology) {
            html += `<h2>منهجية البحث</h2>`;
            html += `<p>اعتمدت هذه الدراسة على المنهج الوصفي التحليلي، حيث تم جمع البيانات من خلال مراجعة الأدبيات السابقة وتحليل الدراسات ذات الصلة. تم تصميم استبانة إلكترونية وتوزيعها على عينة عشوائية بلغ حجمها 150 مشاركًا من المهتمين بالمجال. تم تحليل البيانات باستخدام برنامج SPSS الإحصائي.</p>`;
            html += `<table border="1" style="border-collapse: collapse; width: 100%;">
                <tr><th>الفئة</th><th>العدد</th><th>النسبة المئوية</th></tr>
                <tr><td>أكاديميون</td><td>65</td><td>43.3%</td></tr>
                <tr><td>باحثون</td><td>50</td><td>33.3%</td></tr>
                <tr><td>طلاب دراسات عليا</td><td>35</td><td>23.4%</td></tr>
            </table>`;
        }
        
        // Main chapters
        const chapters = Math.min(4, Math.max(2, Math.floor(pages / 5) + 1));
        for (let i = 1; i <= chapters; i++) {
            html += `<h2>الفصل ${i}: ${i === 1 ? 'الإطار النظري والدراسات السابقة' : i === 2 ? 'تحليل البيانات والنتائج' : i === 3 ? 'مناقشة النتائج' : 'التوصيات والمقترحات'}</h2>`;
            html += `<p>تناول هذا الفصل بالتحليل المفصل لمختلف الجوانب المرتبطة بـ "${title}". حيث تم استعراض أهم النظريات العلمية والأطر النظرية التي تفسر هذه الظاهرة. كما تم تحليل نتائج الدراسات السابقة ومقارنتها مع نتائج الدراسة الحالية.</p>`;
            html += `<p>أظهرت النتائج أن هناك علاقة قوية وإيجابية بين المتغيرات الرئيسية، حيث بلغ معامل الارتباط 0.78 عند مستوى دلالة 0.01. كما أشارت النتائج إلى أن 67% من المشاركين يؤيدون أهمية تطبيق التوصيات المقترحة.</p>`;
        }
        
        // Conclusion
        if (includeConclusion) {
            html += `<h2>الخاتمة والتوصيات</h2>`;
            html += `<p>خلصت هذه الدراسة إلى مجموعة من النتائج المهمة التي تسهم في تعزيز المعرفة العلمية حول "${title}". حيث تم تأكيد الفرضيات الرئيسية للبحث، وتبين أن هناك تأثيرًا إيجابيًا ذا دلالة إحصائية بين المتغيرات المدروسة.</p>`;
            html += `<h3>التوصيات</h3>`;
            html += `<ul><li>ضرورة الاهتمام بتطوير البنية التحتية المعرفية في هذا المجال</li><li>عقد دورات تدريبية متخصصة للمهتمين</li><li>إجراء المزيد من الدراسات المستقبلية لتوسيع نطاق البحث</li><li>التعاون بين المؤسسات الأكاديمية والتطبيقية لتنفيذ التوصيات</li></ul>`;
        }
        
        // References
        if (includeReferences) {
            html += `<h2>المصادر والمراجع</h2>`;
            html += `<ul>
                <li>أحمد، محمد (2023). البحث العلمي بين النظرية والتطبيق. دار الفكر العربي، القاهرة.</li>
                <li>الخالدي، سامر (2022). منهجية البحث في العلوم الإنسانية. دار المناهج، عمان.</li>
                <li>الشمري، عبدالله (2024). التطورات الحديثة في المناهج التعليمية. مجلة الدراسات التربوية، المجلد 15، العدد 2، ص 45-67.</li>
                <li>Johnson, L. (2023). Research Methods in Education. Oxford University Press.</li>
                <li>Smith, J. & Brown, A. (2024). Digital Transformation in Higher Education. Journal of Educational Technology, 42(3), 112-128.</li>
                <li>UNESCO (2023). Global Education Monitoring Report. Paris: UNESCO Publishing.</li>
                <li>World Bank (2024). The Role of AI in Education. Washington, DC: World Bank Group.</li>
                <li>عبد الرحمن، فاطمة (2023). أثر الذكاء الاصطناعي على جودة التعليم. المؤتمر الدولي للتعليم الرقمي، الرياض.</li>
                <li>الحارثي، نايف (2024). الابتكار في المناهج الدراسية. مركز البحوث التربوية، الرياض.</li>
                <li>Williams, R. (2022). Artificial Intelligence in Education. Cambridge University Press.</li>
            </ul>`;
        }
        
        html += `<p style="text-align: center; margin-top: 40px; color: #718096; font-size: 12px;">تم إنشاء هذا البحث بواسطة منشئ الأبحاث المتقدم | جميع الحقوق محفوظة</p>`;
        html += `</div>`;
        
        currentGeneratedHTML = html;
        document.getElementById('researchResult').innerHTML = html;
        return true;
    }
    
    // Gemini AI generator
    async function generateAIGemini() {
        const GEMINI_API_KEY = "AIzaSyCQ8j-8x6khhs-qBMH4Sh4JZ2ObvJAWX3U";
        const title = document.getElementById('title').value.trim();
        
        if (!title) {
            alert('الرجاء إدخال عنوان البحث');
            return false;
        }
        
        const pages = parseInt(pagesInput.value);
        const language = document.getElementById('language').value;
        
        let langText = "";
        if (language === 'arabic') langText = "اللغة: العربية الفصحى";
        else if (language === 'english') langText = "Language: English";
        else langText = "Язык: Русский";
        
        const prompt = `اكتب بحثًا علميًا كاملاً حول: "${title}"
${langText}
عدد الصفحات: ${pages} صفحة
استخدم HTML مع تنسيق أكاديمي
استخدم <h1> للعنوان، <h2> للفصول، <p> للفقرات
أضف مقدمة، محتوى رئيسي، خاتمة، ومراجع
اكتب البحث مباشرة بدون شرح إضافي:`;
        
        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
            })
        });
        
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        let html = data.candidates[0].content.parts[0].text;
        html = html.replace(/```html/g, '').replace(/```/g, '');
        if (!html.includes('<h1>')) html = `<h1>${title}</h1>\n${html}`;
        
        currentGeneratedHTML = `<div class="academic-content">${html}</div>`;
        document.getElementById('researchResult').innerHTML = currentGeneratedHTML;
        return true;
    }
    
    // Main generate function
    async function generateResearch() {
        const generateBtn = document.getElementById('generateBtn');
        const originalText = generateBtn.innerHTML;
        generateBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التوليد...';
        generateBtn.disabled = true;
        
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';
        
        try {
            let success = false;
            
            if (currentMode === 'local') {
                progressFill.style.width = '50%';
                success = generateLocalResearch();
                progressFill.style.width = '100%';
            } else {
                progressFill.style.width = '30%';
                try {
                    success = await generateAIGemini();
                    progressFill.style.width = '100%';
                } catch (error) {
                    console.warn('AI failed, falling back to local');
                    progressFill.style.width = '70%';
                    success = generateLocalResearch();
                    progressFill.style.width = '100%';
                    apiStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> <strong>تم التبديل للوضع المحلي</strong> - AI غير متاح حالياً';
                }
            }
            
            if (success) {
                applyAdvancedStyling();
                document.getElementById('exportBar').style.display = 'flex';
                const langMap = { arabic: 'العربية', english: 'English', russian: 'Русский' };
                document.getElementById('langBadge').innerText = langMap[document.getElementById('language').value];
            }
            
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 1000);
            
        } catch (error) {
            console.error(error);
            alert('حدث خطأ. سيتم استخدام الوضع المحلي.');
            generateLocalResearch();
            applyAdvancedStyling();
            document.getElementById('exportBar').style.display = 'flex';
            progressContainer.style.display = 'none';
        } finally {
            generateBtn.innerHTML = originalText;
            generateBtn.disabled = false;
        }
    }
    
    function applyAdvancedStyling() {
        const researchDiv = document.getElementById('researchResult');
        if (!researchDiv) return;
        
        researchDiv.style.fontFamily = document.getElementById('fontFamily').value;
        researchDiv.style.fontSize = document.getElementById('fontSize').value;
        researchDiv.style.lineHeight = document.getElementById('lineHeight').value;
        researchDiv.style.padding = document.getElementById('marginSize').value;
        researchDiv.style.textAlign = document.getElementById('paragraphAlign').value;
        
        const language = document.getElementById('language').value;
        researchDiv.style.direction = language === 'arabic' ? 'rtl' : 'ltr';
    }
    
    function exportToWord() {
        if (!currentGeneratedHTML) { alert('الرجاء توليد البحث أولاً'); return; }
        const title = document.getElementById('title').value.trim() || 'research';
        const blob = new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title></head><body>${currentGeneratedHTML}</body></html>`], { type: 'application/msword' });
        saveAs(blob, `${title.replace(/[\\/:*?"<>|]/g, '_')}.doc`);
    }
    
    function exportToPDF() {
        if (!currentGeneratedHTML) { alert('الرجاء توليد البحث أولاً'); return; }
        const element = document.getElementById('researchResult');
        html2pdf().set({ margin: 0.75, filename: `${document.getElementById('title').value.trim() || 'research'}.pdf`, image: { quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(element).save();
    }
    
    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('researchResult').innerText).then(() => alert('✅ تم النسخ'));
    }
    
    document.getElementById('generateBtn').addEventListener('click', generateResearch);
    document.getElementById('wordBtn').addEventListener('click', exportToWord);
    document.getElementById('pdfBtn').addEventListener('click', exportToPDF);
    document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
    
    ['fontFamily', 'fontSize', 'lineHeight', 'marginSize', 'headingStyle', 'paragraphAlign', 'language'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyAdvancedStyling);
    });
</script>
